name = "pixelreveal"
main = "worker/index.ts"
compatibility_date = "2024-06-01"
# Durable Objects = WebSocket Hibernation API → exige cette flag
compatibility_flags = ["nodejs_compat"]

# Pas de binding [assets] ici : les assets d'artwork contiennent `answer` (la clé de réponse)
# et ne doivent JAMAIS être servis publiquement (§4.3/§9). Ils sont chargés côté serveur :
# au MVP, bundlés dans le worker (worker/assets.ts) ; à terme déplaçables en R2/KV privé.
# Le front statique (public/) est déployé séparément via Cloudflare Pages.

# --- Durable Objects : un binding par rôle (cf. CLAUDE.md §4.1) ---
# ARTWORK_ROOM : une instance par artwork (room). COORDINATOR : singleton pipeline.
[[durable_objects.bindings]]
name = "ARTWORK_ROOM"
class_name = "ArtworkRoom"

[[durable_objects.bindings]]
name = "COORDINATOR"
class_name = "Coordinator"

# Migration initiale : déclare les classes DO (implémentées plus tard).
[[migrations]]
tag = "v1"
new_classes = ["ArtworkRoom", "Coordinator"]
