<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>PixelReveal</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Écran pseudo : 1 champ, stocké en localStorage (cf. §8). -->
  <div id="login" class="overlay">
    <div class="card">
      <h1>Pixel Reveal</h1>
      <p class="muted">Click on pixels, reveal images, enjoy together.</p>
      <form id="loginForm">
        <input id="pseudo" maxlength="20" placeholder="ton pseudo" autocomplete="off" required />
        <button type="submit">Play</button>
      </form>
      <label class="spectate"><input type="checkbox" id="spectate" /> Spectate</label>
      <p class="muted"><a href="gallery.html">Galery</a></p>
    </div>
  </div>

  <!-- Jeu -->
  <header id="hud" hidden>
    <span class="dot"></span>
    <span><b id="online">0</b> en ligne</span>
    <span class="sep">·</span>
    <span><b id="meName">toi</b> : <b id="mine">0</b> pixels</span>
    <div id="bar"><div id="fill"></div></div>
    <span id="pct">0%</span>
    <span id="cool" class="cool"></span>
    <button id="share" title="Copier le lien">Partager</button>
  </header>

  <main id="stage" hidden>
    <div id="wrap">
      <canvas id="cv" width="1" height="1"></canvas>
      <canvas id="fx" width="1" height="1"></canvas>
      <div id="cursors"></div>
    </div>
  </main>

  <!-- Beat de complétion : image terminée + classement, ferme au clic / timeout (cf. §4.7). -->
  <div id="done" class="overlay" hidden>
    <div class="card">
      <h2>🎉 Image complétée !</h2>
      <ol id="ranking"></ol>
      <p class="muted">Passage à l'œuvre suivante…</p>
      <button id="next">Continuer</button>
    </div>
  </div>

  <!-- Box du pixel visé : hors #wrap (non transformé), dimensionnée en px (taille réelle 1 cellule). -->
  <div id="aim" hidden></div>

  <script src="main.js" type="module"></script>
</body>
</html>
