<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PixelReveal — client de dev</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; font: 14px system-ui, sans-serif; background: #111; color: #ddd;
         display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 16px; }
  h1 { font-size: 16px; font-weight: 500; margin: 0; }
  #setup { display: flex; gap: 8px; align-items: center; }
  input { background: #1c1c1c; border: 1px solid #333; color: #ddd; padding: 6px 8px; border-radius: 6px; }
  button { background: #2d6; border: 0; color: #042; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
  /* Canvas net : un pixel grille = un bloc, jamais de lissage (cf. §8). */
  #cv { image-rendering: pixelated; border: 1px solid #333; cursor: crosshair; touch-action: none; }
  #bar { width: 600px; height: 8px; background: #222; border-radius: 4px; overflow: hidden; }
  #fill { height: 100%; width: 0; background: #2d6; transition: width .15s; }
  #hud { display: flex; gap: 16px; font-variant-numeric: tabular-nums; }
  .muted { color: #888; }
  #cool { color: #e84; }
</style>
</head>
<body>
  <h1>PixelReveal — client de dev</h1>

  <div id="setup">
    <input id="pseudo" placeholder="pseudo" />
    <input id="url" size="32" value="ws://127.0.0.1:8787/ws" />
    <button id="connect">Connecter</button>
  </div>

  <div id="hud">
    <span>État : <b id="state">déconnecté</b></span>
    <span>En ligne : <b id="online">0</b></span>
    <span>Progress : <b id="prog">0 / 0</b> (<b id="pct">0%</b>)</span>
    <span id="cool"></span>
  </div>

  <div id="bar"><div id="fill"></div></div>

  <!-- taille réelle fixée au welcome ; agrandissement via CSS width/height -->
  <canvas id="cv" width="1" height="1" style="width:600px;height:600px"></canvas>

  <p class="muted">Lance d'abord <code>npm run dev</code>, puis ouvre cette page. Clique un pixel pour révéler sa couleur.</p>

<script type="module">
const $ = (id) => document.getElementById(id);
const UNREVEALED = 0xff;

let ws = null, ctx = null, img = null, palette = [], W = 0, H = 0, total = 0;
let cooldownUntil = 0;

// uuid robuste : crypto.randomUUID n'existe qu'en contexte sécurisé (pas en file://).
function uuid() {
  if (globalThis.crypto?.randomUUID) return crypto.randomUUID();
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, (c) => {
    const r = (Math.random() * 16) | 0;
    return (c === "x" ? r : (r & 0x3) | 0x8).toString(16);
  });
}

// localStorage peut être bloqué (iframe sandbox) : on dégrade sans planter.
const store = (k, v) => { try { localStorage.setItem(k, v); } catch {} };
const load = (k) => { try { return localStorage.getItem(k); } catch { return null; } };

// sessionId persistant (porte le cooldown serveur, suit le joueur) — cf. §4.6.
let sessionId = load("pixelreveal.sessionId");
if (!sessionId) { sessionId = uuid(); store("pixelreveal.sessionId", sessionId); }
$("pseudo").value = load("pixelreveal.pseudo") || "";

function hexToRgb(h) { return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }

function paintPixel(i, c) {
  const [r,g,b] = palette[c] ? hexToRgb(palette[c]) : [16,16,16];
  const o = i * 4;
  img.data[o] = r; img.data[o+1] = g; img.data[o+2] = b; img.data[o+3] = 255;
}

function drawSnapshot(bytes) {
  img = ctx.createImageData(W, H);
  for (let i = 0; i < total; i++) {
    if (bytes[i] === UNREVEALED) { // non révélé = fond sombre
      const o = i*4; img.data[o]=16; img.data[o+1]=16; img.data[o+2]=16; img.data[o+3]=255;
    } else paintPixel(i, bytes[i]);
  }
  ctx.putImageData(img, 0, 0);
}

function setProgress(rev, tot) {
  $("prog").textContent = `${rev} / ${tot}`;
  const pct = tot ? Math.round((rev/tot)*1000)/10 : 0;
  $("pct").textContent = pct + "%";
  $("fill").style.width = pct + "%";
}

$("connect").onclick = () => {
  const pseudo = $("pseudo").value.trim() || "anon";
  store("pixelreveal.pseudo", pseudo);
  // Page en https + ws:// = mixed content, bloqué silencieusement par le navigateur.
  if (location.protocol === "https:" && $("url").value.startsWith("ws://")) {
    $("state").textContent = "bloqué (https→ws). Ouvre ce fichier en local (file://).";
    return;
  }
  if (ws) ws.close();
  try { ws = new WebSocket($("url").value); }
  catch (e) { $("state").textContent = "erreur WS: " + e.message; return; }
  ws.binaryType = "arraybuffer";

  ws.onopen = () => { $("state").textContent = "connecté"; ws.send(JSON.stringify({ type:"hello", pseudo, sessionId })); };
  ws.onclose = () => { $("state").textContent = "déconnecté"; };
  ws.onerror = () => { $("state").textContent = "erreur"; };

  ws.onmessage = (ev) => {
    if (ev.data instanceof ArrayBuffer) { drawSnapshot(new Uint8Array(ev.data)); return; } // snapshot binaire
    const m = JSON.parse(ev.data);
    if (m.type === "welcome") {
      W = m.width; H = m.height; total = W*H; palette = m.palette;
      const cv = $("cv"); cv.width = W; cv.height = H; ctx = cv.getContext("2d");
      setProgress(m.progress.revealed, m.progress.total);
      $("online").textContent = m.online;
    } else if (m.type === "painted") {
      paintPixel(m.i, m.c); ctx.putImageData(img, 0, 0); // delta : un seul pixel
    } else if (m.type === "progress") {
      setProgress(m.revealed, m.total);
    } else if (m.type === "online") {
      $("online").textContent = m.count;
    } else if (m.type === "cooldown") {
      cooldownUntil = m.until; tickCooldown();
    } else if (m.type === "completed") {
      $("state").textContent = "🎉 100% — completed !";
    }
  };
};

function tickCooldown() {
  const left = cooldownUntil - Date.now();
  if (left > 0) { $("cool").textContent = `cooldown ${(left/1000).toFixed(1)}s`; requestAnimationFrame(tickCooldown); }
  else $("cool").textContent = "";
}

// Clic canvas -> index pixel -> paint (le serveur arbitre cooldown + révélation).
$("cv").onclick = (e) => {
  if (!ws || ws.readyState !== 1) return;
  const r = e.currentTarget.getBoundingClientRect();
  const x = Math.floor((e.clientX - r.left) / r.width * W);
  const y = Math.floor((e.clientY - r.top) / r.height * H);
  if (x < 0 || y < 0 || x >= W || y >= H) return;
  ws.send(JSON.stringify({ type:"paint", i: y*W + x }));
};
</script>
</body>
</html>
