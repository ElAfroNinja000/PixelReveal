<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Pixel Reveal</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="login" class="overlay">
    <div class="card">
      <h1>Pixel Reveal</h1>
      <p class="muted">Click on pixels, reveal images, enjoy together.</p>
      <form id="loginForm">
        <input id="pseudo" maxlength="20" placeholder="your nickname" autocomplete="off" required />
        <button type="submit">Play</button>
      </form>
      <label class="spectate"><input type="checkbox" id="spectate" /> Spectate</label>
      <a href="gallery.html" class="btn gallery-btn">Gallery</a>
    </div>
  </div>

  <!-- HUD -->
  <header id="hud" hidden>
    <span class="dot"></span>
    <span><b id="online">0</b> online</span>
    <span class="sep">·</span>
    <span><b id="meName">you</b>: <b id="mine">0</b> pixels</span>
    <div id="bar"><div id="fill"></div></div>
    <span id="pct">0%</span>
    <span id="cool" class="cool"></span>
    <button id="share" title="Copy link">Share</button>
  </header>

  <!-- Loader -->
  <div id="loader" class="overlay" hidden>
    <div class="card">
      <div class="spinner"></div>
      <p class="muted">Connecting...</p>
    </div>
  </div>

  <main id="stage" hidden>
    <div id="wrap">
      <div id="zoomLayer">
        <canvas id="cv" width="1" height="1"></canvas>
        <canvas id="fx" width="1" height="1"></canvas>
        <div id="cursors"></div>
      </div>
    </div>
    <aside id="leaderboard" class="lb">
      <button id="lbToggle" class="lb-toggle">Players</button>
      <div id="lbPanel" class="lb-panel" hidden>
        <h3>Players</h3>
        <ol id="lbList"></ol>
      </div>
    </aside>
  </main>

  <!-- Completion beat -->
  <div id="done" class="overlay" hidden>
    <div class="card">
      <h2>Image completed!</h2>
      <ol id="ranking"></ol>
      <p class="muted">Moving to the next artwork...</p>
      <button id="next">Continue</button>
    </div>
  </div>

  <div id="aim" hidden></div>

  <script src="main.js" type="module"></script>
</body>
</html>
